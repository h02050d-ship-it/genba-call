<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>現場呼出 | 林材木店</title>
<style>
  :root { --bg:#0f1115; --card:#1b1f27; --txt:#f2f4f8; --sub:#9aa3b2; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--txt);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:24px 16px 40px;
  }
  h1 { font-size:20px; margin:8px 0 4px; }
  .place { color:var(--sub); font-size:14px; margin-bottom:24px; }
  .place b { color:#ffd34d; }
  .grid { width:100%; max-width:440px; display:flex; flex-direction:column; gap:16px; }
  .btn {
    border:none; border-radius:18px; color:#fff; font-size:26px; font-weight:700;
    padding:30px 20px; cursor:pointer; transition:transform .08s, opacity .2s;
    box-shadow:0 6px 16px rgba(0,0,0,.35); position:relative;
  }
  .btn:active { transform:scale(.97); }
  .btn:disabled { opacity:.45; cursor:default; }
  .btn small { display:block; font-size:14px; font-weight:400; opacity:.85; margin-top:6px; }
  .c1 { background:linear-gradient(135deg,#2d7dff,#1856c9); }
  .c2 { background:linear-gradient(135deg,#19b36b,#0f8a50); }
  .c3 { background:linear-gradient(135deg,#ff7a3d,#e0541c); }
  #toast {
    position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(40px);
    background:#000; color:#fff; padding:14px 22px; border-radius:30px; font-size:15px;
    opacity:0; transition:.25s; pointer-events:none; max-width:90%; text-align:center;
  }
  #toast.show { opacity:.95; transform:translateX(-50%) translateY(0); }
  #toast.ok { background:#0f8a50; } #toast.ng { background:#c0392b; }
  footer { color:var(--sub); font-size:11px; margin-top:28px; }
</style>
</head>
<body>
  <h1>現場呼出</h1>
  <div class="place">呼出先：<b>加工場</b></div>

  <div class="grid" id="grid"></div>

  <div id="toast"></div>
  <footer>林材木店 / 現場呼出ツール</footer>

<script>
  /* ===== 設定（あとで実値に差し替え） ===== */
  const GAS_URL    = "https://script.google.com/macros/s/AKfycbxcvQZVi497obS-nRm4MdN0tYtsaTb03n7FLFWy7oZN2vkItKm7oQO9_85WdJYxGjgaiA/exec";   // GASウェブアプリのデプロイURL
  const SHARED_KEY = "sk-edNLrUTi9sCrAo1tJmiiA"; // GASの SHARED_KEY と一致させる
  /* ======================================= */

  const PEOPLE = [
    { key:"daiki", label:"林大樹を呼ぶ",  cls:"c1" },
    { key:"junya", label:"林潤也を呼ぶ",  cls:"c2" },
    { key:"kaede", label:"林楓を呼ぶ",    cls:"c3" },
  ];

  const grid = document.getElementById("grid");
  const toast = document.getElementById("toast");
  let lock = false;

  PEOPLE.forEach(p => {
    const b = document.createElement("button");
    b.className = "btn " + p.cls;
    b.innerHTML = p.label + "<small>加工場に呼び出します</small>";
    b.onclick = () => call(p, b);
    grid.appendChild(b);
  });

  function showToast(msg, type) {
    toast.textContent = msg;
    toast.className = "show " + (type || "");
    setTimeout(() => toast.className = "", 2600);
  }

  async function call(p, btn) {
    if (lock) return;
    if (!confirm(p.label.replace("を呼ぶ","") + "さんを加工場に呼びます。よろしいですか？")) return;
    lock = true;
    PEOPLE.forEach((_, i) => grid.children[i].disabled = true);
    showToast("送信中…");
    try {
      const res = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" }, // preflight回避
        body: JSON.stringify({ key: SHARED_KEY, target: p.key, by: "現場PC" }),
      });
      const data = await res.json();
      if (data.ok) showToast(p.label.replace("を呼ぶ","") + "さんに通知しました ✓", "ok");
      else showToast("失敗：" + (data.error || data.status || "不明"), "ng");
    } catch (e) {
      showToast("送信エラー：通信を確認してください", "ng");
    } finally {
      setTimeout(() => {
        lock = false;
        PEOPLE.forEach((_, i) => grid.children[i].disabled = false);
      }, 8000); // 連打・誤発防止のクールダウン
    }
  }
</script>
</body>
</html>
